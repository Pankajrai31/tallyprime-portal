<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tally Prime</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="shell">
    <div class="card-auth">
      <div class="brand">
        <span class="brand-mark">T</span>
        <span class="brand-name">Tally Prime</span>
      </div>
      <h1>Welcome</h1>
      <p class="sub">Sign in with your work account to launch Tally Prime as a Remote App.</p>

      <div class="cta-col">
        <button id="signinBtn" class="btn btn-primary">Sign in</button>
        <button id="launchBtn" class="btn btn-primary" hidden>Open Tally Prime</button>
        <button id="signoutBtn" class="btn btn-ghost" hidden>Sign out</button>
      </div>

      <p id="statusMsg" class="status"></p>
      <p class="foot">Hosted on Microsoft Azure (Central India)</p>
    </div>
  </main>
  <script type="module" src="auth.js?v=3"></script>
</body>
</html>
